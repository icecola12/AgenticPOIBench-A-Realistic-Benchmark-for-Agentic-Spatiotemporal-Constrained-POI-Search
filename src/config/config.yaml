

paths:
  eval_json: data/eval.json
  prompt_yaml: src/prompt/prompt.yaml
  verify_scripts_dir: verify_scripts
  output_dir: runs


env:
  amap_key_env: AMAP_MCP_KEY
  llm_key_env: LITELLM_API_KEY

llm:
  user_model: deepseek/deepseek-chat
  agent_model: deepseek/deepseek-chat
  extract_model: deepseek/deepseek-chat
  max_concurrent_llm: 4
  temperature: 0.0
  max_agent_tool_rounds: 16

mcp:
  
  max_concurrent_mcp: 2

dialog:
  max_turns: 30
  stop_token: "###STOP###"

runs:
  num_repeats: 3
  run_name: default
